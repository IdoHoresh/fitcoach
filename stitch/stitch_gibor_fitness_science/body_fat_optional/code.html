            background-color: #0D1117;

            width: calc((100% / 11) * 3);
        }

            box-shadow: 0 0 40px rgba(45, 212, 191, 0.08);
        }

<body class="text-on-surface flex flex-col min-h-screen">
<!-- Top Navigation Bar (Suppressed Shell for Transactional Context) -->
<header class="w-full px-6 pt-8 pb-4 flex flex-row-reverse justify-between items-center bg-transparent">
<button class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-surface-container transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined text-on-surface text-2xl">arrow_forward</span>
</button>
<div class="flex-1 flex justify-center pr-10">
<div class="h-1.5 w-48 bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-primary-container step-indicator transition-all duration-500 ease-out"></div>
</div>
</div>
</header>
<main class="flex-1 flex flex-col px-8 pt-12">
<!-- Editorial Headline Section -->
<div class="mb-12 text-right">
<h1 class="text-3xl font-bold text-on-surface mb-3 tracking-tight">אחוז שומן גוף</h1>
<p class="text-slate-400 text-lg leading-relaxed font-light">
                אופציונלי — עוזר לנו לדייק
            </p>
</div>
<!-- Central Interaction Area: Asymmetric & Quiet -->
<div class="flex-1 flex flex-col items-center justify-center -mt-16">
<div class="relative group">
<!-- Decorative Ambient Glow -->
<div class="absolute -inset-10 bg-primary/5 rounded-full blur-3xl opacity-50 group-hover:opacity-100 transition-opacity duration-700"></div>
<div class="relative flex flex-col items-center">
<!-- The Stepper UI -->
<div class="flex items-center gap-12 mb-8">
<button class="w-14 h-14 rounded-full border border-outline-variant/20 flex items-center justify-center hover:bg-surface-container-high active:scale-90 transition-all">
<span class="material-symbols-outlined text-primary text-3xl">remove</span>
</button>
<div class="flex flex-col items-center">
<span class="text-[84px] font-extrabold text-on-surface leading-none tracking-tighter" dir="ltr">18%</span>
</div>
<button class="w-14 h-14 rounded-full border border-outline-variant/20 flex items-center justify-center hover:bg-surface-container-high active:scale-90 transition-all">
<span class="material-symbols-outlined text-primary text-3xl">add</span>
</button>
</div>
<!-- Visual Representation / Slider (Secondary Context) -->
<div class="w-full max-w-xs h-24 rounded-2xl glass-panel border border-outline-variant/10 p-6 flex items-center justify-between overflow-hidden">
<div class="flex flex-col gap-1">
<span class="text-xs text-slate-500 font-medium">טווח מומלץ</span>
<span class="text-sm text-on-surface font-semibold">14% - 20%</span>
</div>
<div class="w-24 h-12 relative">
<div class="absolute inset-0 flex items-end gap-1">
<div class="w-1.5 h-4 bg-surface-container-highest rounded-full"></div>
<div class="w-1.5 h-6 bg-surface-container-highest rounded-full"></div>
<div class="w-1.5 h-8 bg-primary rounded-full"></div>
<div class="w-1.5 h-10 bg-primary-container rounded-full"></div>
<div class="w-1.5 h-8 bg-surface-container-highest rounded-full"></div>
<div class="w-1.5 h-6 bg-surface-container-highest rounded-full"></div>
<div class="w-1.5 h-4 bg-surface-container-highest rounded-full"></div>
</div>
</div>
</div>
</div>
</div>
<!-- Descriptive Image / Aesthetic Anchor -->
<div class="mt-16 w-full max-w-xs rounded-3xl overflow-hidden aspect-[4/3] grayscale opacity-40 hover:grayscale-0 transition-all duration-700">

</div>
</div>

<button class="w-full py-4 bg-primary-container text-on-primary-container font-bold text-lg rounded-xl active:scale-[0.98] transition-transform duration-150 shadow-lg shadow-primary-container/10">
                המשך
            </button>
<button class="text-slate-400 font-medium hover:text-on-surface transition-colors active:scale-95">
