<body class="min-h-screen flex flex-col items-center justify-start overflow-x-hidden p-0 m-0">
<!-- Top Navigation Anchor -->
<header class="bg-[#181c22] fixed top-0 w-full z-50 flex flex-row-reverse justify-between items-center px-6 py-4">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#2dd4bf]">menu</span>
<h1 class="font-['Rubik'] font-bold text-right text-xl text-[#2dd4bf] tracking-tight">גִּבּוֹר</h1>
</div>
<div class="w-8 h-8 rounded-full overflow-hidden bg-surface-container-high">

</div>

<main class="w-full max-w-md mt-20 px-6 pb-32 flex flex-col">
<!-- Progress Bar Section -->
<div class="w-full mt-4 mb-8">
<div class="flex justify-between items-center mb-3">
<span class="text-sm font-medium text-on-surface-variant font-label">שלב 5 מתוך 11</span>
<span class="text-xs text-primary font-bold">45%</span>
</div>
<div class="h-1.5 w-full bg-surface-container rounded-full overflow-hidden">
<div class="h-full bg-primary-container w-[45%] rounded-full shadow-[0_0_8px_rgba(45,212,191,0.4)]"></div>
</div>
</div>
<!-- Hero Title -->
<div class="mb-8">
<h2 class="text-3xl font-bold text-on-surface leading-tight font-headline">איפה אתה מתאמן?</h2>
<p class="text-on-surface-variant mt-2 text-sm">התאם את חוויית האימון שלך לציוד הזמין.</p>
</div>
<!-- Location Cards Grid -->
<div class="space-y-4 mb-10">
<!-- Full Gym -->
<div class="group relative bg-[#1c2026] hover:bg-surface-bright p-5 rounded-xl border border-transparent transition-all duration-200 cursor-pointer flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-lg bg-surface-container-high flex items-center justify-center text-2xl">

                    </div>

</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center">
<div class="w-3 h-3 rounded-full bg-transparent"></div>
</div>
</div>

<div class="flex items-center justify-between mb-0">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-lg bg-[#2dd4bf]/10 flex items-center justify-center text-2xl">

                        </div>

</div>

</div>
</div>

<h3 class="text-[#9CA3AF] text-sm font-bold mb-4">מה יש לך בבית?</h3>

<label class="flex items-center justify-between bg-surface-container-lowest p-3 rounded-lg cursor-pointer hover:bg-surface-container transition-colors">
<span class="text-on-surface text-sm">מוט משקולות (Barbell)</span>
<input checked="" class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary bg-surface-container" type="checkbox"/>
</label>
<label class="flex items-center justify-between bg-surface-container-lowest p-3 rounded-lg cursor-pointer hover:bg-surface-container transition-colors">
<span class="text-on-surface text-sm">משקולות יד (Dumbbells)</span>
<input checked="" class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary bg-surface-container" type="checkbox"/>
</label>
<label class="flex items-center justify-between bg-surface-container-lowest p-3 rounded-lg cursor-pointer hover:bg-surface-container transition-colors">
<span class="text-on-surface text-sm">מתח (Pull-up bar)</span>
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary bg-surface-container" type="checkbox"/>
</label>
<label class="flex items-center justify-between bg-surface-container-lowest p-3 rounded-lg cursor-pointer hover:bg-surface-container transition-colors">
<span class="text-on-surface text-sm">ספת כושר (Bench)</span>
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary bg-surface-container" type="checkbox"/>
</label>
<label class="flex items-center justify-between bg-surface-container-lowest p-3 rounded-lg cursor-pointer hover:bg-surface-container transition-colors">
<span class="text-on-surface text-sm">גומיות התנגדות</span>
<input checked="" class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary bg-surface-container" type="checkbox"/>
</label>
</div>
</div>
</div>

<span class="font-['Rubik'] text-[12px] font-medium mt-1">אימונים</span>

<a class="flex flex-col items-center justify-center text-slate-500 hover:text-[#57f1db] transition-all" href="#">
<span class="material-symbols-outlined" data-icon="restaurant">restaurant</span>

<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-['Rubik'] text-[12px] font-medium mt-1">פרופיל</span>
</a>
