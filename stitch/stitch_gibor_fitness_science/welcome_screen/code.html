<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #10141a;
            font-family: 'Rubik', sans-serif;
            color: #dfe2eb;
            overflow: hidden;
        }
        .glow-effect {
            box-shadow: 0 0 40px rgba(45, 212, 191, 0.15);
        }
        .bg-mesh {
            background: radial-gradient(circle at 50% 50%, #1c2026 0%, #10141a 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-mesh min-h-screen flex flex-col items-center justify-between antialiased">
<!-- Top AppBar Suppressed per Transactional/Onboarding Rule -->
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center w-full max-w-md px-8 text-center">
<!-- App Icon / Brand Anchor -->
<div class="relative mb-8 group">
<div class="absolute inset-0 bg-primary-container/20 blur-3xl rounded-full scale-150 transition-all duration-1000"></div>
<div class="relative bg-surface-container-high w-32 h-32 rounded-3xl flex items-center justify-center border border-outline-variant/10 shadow-2xl">
<span class="material-symbols-outlined text-primary-container text-7xl" style="font-variation-settings: 'FILL' 1;">
                    fitness_center
                </span>
</div>
</div>
<!-- Typography Cluster -->
<div class="space-y-4">
<h1 class="text-5xl font-extrabold text-on-surface tracking-tight">גִּבּוֹר</h1>
<p class="text-lg text-on-surface-variant font-light tracking-wide leading-relaxed">
                מאמן כושר אישי מבוסס מדע
            </p>
</div>
<!-- Decorative Lab-Grade Elements -->
<div class="mt-16 flex gap-3">
<div class="h-1 w-8 rounded-full bg-primary-container"></div>
<div class="h-1 w-2 rounded-full bg-outline-variant/30"></div>
<div class="h-1 w-2 rounded-full bg-outline-variant/30"></div>
</div>
</main>
<!-- Call to Action Section -->
<section class="w-full max-w-md px-8 pb-16">
<button class="w-full bg-primary-container text-on-primary-container font-bold text-xl py-5 rounded-xl shadow-[0_8px_30px_rgb(45,212,191,0.2)] active:scale-95 transition-all duration-200 flex items-center justify-center gap-3">
<span>בוא נתחיל</span>
<span class="material-symbols-outlined">arrow_back</span>
</button>
<!-- Secondary Action -->
<div class="mt-6 text-center">
<button class="text-sm text-on-surface-variant/70 hover:text-primary transition-colors">
                כבר יש לך חשבון? <span class="text-primary font-medium">התחברות</span>
</button>
</div>
</section>
<!-- Bottom Navigation Suppressed per Onboarding/Task Rule -->
<!-- Ambient Lab Overlay -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none z-[-1] opacity-30">
<div class="absolute top-[-10%] right-[-10%] w-64 h-64 bg-primary/10 blur-[100px] rounded-full"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-80 h-80 bg-secondary/5 blur-[120px] rounded-full"></div>
</div>
