name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

      - name: Run tests
        run: npm test -- --passWithNoTests --ci

      - name: Algorithm coverage check
        run: |
          npm test -- --coverage \
            --collectCoverageFrom='src/algorithms/**/*.ts' \
            --coverageThreshold='{"global":{"branches":80,"functions":80,"lines":80}}' \
            --ci
